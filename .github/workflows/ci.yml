name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

      - name: Mypy — type check
        run: mypy the_architect/

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=long -p no:timeout 2>&1 | tee pytest-output.txt; exit ${PIPESTATUS[0]}
        shell: bash

      - name: Print last 300 lines of pytest output on failure
        if: failure() && runner.os == 'Windows'
        run: Get-Content pytest-output.txt -Tail 300
        shell: pwsh

      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ matrix.os }}-${{ matrix.python-version }}
          path: pytest-output.txt
          retention-days: 3

  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload distribution artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

  release-metadata:
    # Decides whether this main push is build-only CI or a SemVer release.
    # SemVer releases use clean tags (vX.Y.Z); the build number stays in the release title.
    name: Release Metadata
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
      tag: ${{ steps.version.outputs.tag }}
      is_release: ${{ steps.version.outputs.is_release }}
      should_publish: ${{ steps.version.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version and build
        id: version
        run: |
          VERSION=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          ROOT_VERSION=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('version.py').read()).group(1))")
          BUILD=$(python3 -c "import re; print(re.search(r'__build__\s*=\s*(\d+)', open('version.py').read()).group(1))")
          if [[ "$VERSION" != "$ROOT_VERSION" ]]; then
            echo "pyproject.toml version ($VERSION) does not match version.py ($ROOT_VERSION)" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

          PREVIOUS_VERSION=""
          BEFORE_SHA="${{ github.event.before }}"
          if [[ -n "$BEFORE_SHA" ]] && git cat-file -e "$BEFORE_SHA:pyproject.toml" 2>/dev/null; then
            PREVIOUS_VERSION=$(git show "$BEFORE_SHA:pyproject.toml" | python3 -c 'import sys, tomllib; print(tomllib.loads(sys.stdin.read())["project"]["version"])')
          fi

          PYPI_VERSION_EXISTS=$(VERSION="$VERSION" python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          url = "https://pypi.org/pypi/the-architect/json"
          try:
              with urllib.request.urlopen(url, timeout=15) as response:
                  releases = json.load(response).get("releases", {})
          except (OSError, urllib.error.URLError, TimeoutError):
              # Network uncertainty must not create a release by accident.
              print("unknown")
          else:
              print("true" if version in releases else "false")
          PY
          )

          if [[ -n "$PREVIOUS_VERSION" && "$PREVIOUS_VERSION" != "$VERSION" ]]; then
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [[ "$PYPI_VERSION_EXISTS" == "false" ]]; then
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  github-release:
    # SemVer-changing main pushes create a clean vX.Y.Z tag and canonical release.
    # Build-only main pushes do not create GitHub releases.
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, release-metadata]
    if: needs.release-metadata.outputs.is_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download distribution artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-metadata.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: v${{ needs.release-metadata.outputs.version }} (build ${{ needs.release-metadata.outputs.build }})
          prerelease: false
          files: dist/*
          generate_release_notes: true

  publish:
    # Publishes to PyPI only on SemVer-changing main pushes.
    # Build-only pushes to main run CI but never reach this job.
    # The `pypi` environment requires @iNetanel approval before upload.
    #
    # Uses PyPI Trusted Publishing (OIDC) — no API tokens required.
    # See: https://docs.pypi.org/trusted-publishers/
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [github-release, release-metadata]
    if: needs.release-metadata.outputs.should_publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/the-architect
    permissions:
      id-token: write
    steps:
      - name: Download distribution artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
