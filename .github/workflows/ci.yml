name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

      - name: Mypy — type check
        run: mypy the_architect/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload distribution artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

  publish:
    # Publishes to PyPI on tagged releases (v*).
    # Tag format:  v1.0.0+10003  (SemVer + build number)
    # PyPI sees:   1.0.0         (build is stripped — it's for GitHub traceability only)
    # Same SemVer with different build will NOT re-publish — PyPI rejects duplicates.
    #
    # Uses PyPI Trusted Publishing (OIDC) — no API tokens required.
    # See: https://docs.pypi.org/trusted-publishers/
    #
    # One-time setup:
    #   1. Create a "pending publisher" on PyPI: https://pypi.org/manage/account/publishing/
    #      - Project:     the-architect
    #      - Owner:       inetanel
    #      - Repository:  the-architect
    #      - Workflow:    ci.yml
    #      - Environment: pypi
    #   2. Create the `pypi` environment on GitHub:
    #      https://github.com/inetanel/the-architect/settings/environments
    #      (Required reviewer: @iNetanel — approves every release before it lands on PyPI.)
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/the-architect
    permissions:
      id-token: write    # Required for PyPI Trusted Publishing (OIDC).
    steps:
      - name: Download distribution artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Check if version already on PyPI
        id: check-version
        run: |
          # Extract version from wheel filename (e.g., the_architect-1.0.0-py3-none-any.whl)
          WHEEL=$(ls dist/*.whl 2>/dev/null | head -1)
          VERSION=$(echo "$WHEEL" | sed 's/.*-\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/')
          echo "Package version: $VERSION"
          # Query PyPI JSON API — 200 means version exists, 404 means it's new
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/the-architect/$VERSION/json")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Version $VERSION already on PyPI — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION not on PyPI — will publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.check-version.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
