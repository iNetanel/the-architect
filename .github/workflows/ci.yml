name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

      - name: Mypy — type check
        run: mypy the_architect/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload distribution artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

  check-pypi-version:
    name: Check PyPI version
    runs-on: ubuntu-latest
    needs: build
    outputs:
      is_new: ${{ steps.check.outputs.is_new }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version and check PyPI
        id: check
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('version.py').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/the-architect/$VERSION/json" 2>/dev/null || echo "404")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          fi

  github-release:
    # Auto-creates a GitHub release for every green build on main.
    # Same-SemVer builds → pre-release. New-SemVer builds → latest release + PyPI publish.
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version and build
        id: version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('version.py').read()).group(1))")
          BUILD=$(python3 -c "import re; print(re.search(r'__build__\s*=\s*(\d+)', open('version.py').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}+${BUILD}" >> "$GITHUB_OUTPUT"

      - name: Check if version is on PyPI
        id: check-pypi
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/the-architect/${{ steps.version.outputs.version }}/json" 2>/dev/null || echo "404")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "is_new_version=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_new_version=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download distribution artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }} (build ${{ steps.version.outputs.build }})
          prerelease: ${{ steps.check-pypi.outputs.is_new_version == 'false' }}
          files: dist/*
          generate_release_notes: true

  publish:
    # Publishes to PyPI only when a new SemVer is detected.
    # Build-only pushes (same version, new build) do NOT trigger PyPI publish.
    # The `pypi` environment requires @iNetanel approval before upload.
    #
    # Uses PyPI Trusted Publishing (OIDC) — no API tokens required.
    # See: https://docs.pypi.org/trusted-publishers/
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, check-pypi-version]
    if: needs.check-pypi-version.outputs.is_new == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/the-architect
    permissions:
      id-token: write
    steps:
      - name: Download distribution artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
