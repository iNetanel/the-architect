    .c34 { animation: fall 3.6s -2.6s  linear infinite; }
    .c35 { animation: fall 3.9s -1.4s  linear infinite; }
    .c36 { animation: fall 2.9s -0.2s  linear infinite; }
    .c37 { animation: fall 4.4s -1.8s  linear infinite; }
    .c38 { animation: fall 3.1s -1.0s  linear infinite; }
    .c39 { animation: fall 3.7s -2.3s  linear infinite; }
    .c40 { animation: fall 3.4s -0.4s  linear infinite; }
    .c41 { animation: fall 4.1s -1.3s  linear infinite; }
    .c42 { animation: fall 2.7s -2.0s  linear infinite; }

    @keyframes fall {
      from { transform: translateY(-280px); }
      to   { transform: translateY(700px);  }
    }
  </style>
