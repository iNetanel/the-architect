<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420">
<title>Matrix Digital Rain — The Architect</title>

<defs>
  <linearGradient id="vfade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="white" stop-opacity="1"/>
    <stop offset="42%"  stop-color="white" stop-opacity="1"/>
    <stop offset="75%"  stop-color="white" stop-opacity="0.5"/>
    <stop offset="90%"  stop-color="white" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </linearGradient>
  <mask id="fade">
    <rect width="680" height="420" fill="url(#vfade)"/>
  </mask>

  <!-- Gentle glow on head only -->
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <style>
    /* 4 green shades — no flicker classes, pure smooth fall */
    .h  { font-family:'Courier New',Courier,monospace; font-size:14px; fill:#d4f5c0; filter:url(#glow); }
    .g2 { font-family:'Courier New',Courier,monospace; font-size:14px; fill:#7ddb6b; }
    .g3 { font-family:'Courier New',Courier,monospace; font-size:14px; fill:#3db832; }
    .g4 { font-family:'Courier New',Courier,monospace; font-size:14px; fill:#1f8c1c; }

    /* Smooth linear fall — no step-end, no opacity flicker */
    .c0  { animation: fall 3.2s -0.4s  linear infinite; }
    .c1  { animation: fall 4.1s -1.3s  linear infinite; }
    .c2  { animation: fall 2.8s -0.9s  linear infinite; }
    .c3  { animation: fall 4.6s -2.2s  linear infinite; }
    .c4  { animation: fall 3.5s -0.5s  linear infinite; }
    .c5  { animation: fall 3.8s -1.7s  linear infinite; }
    .c6  { animation: fall 2.6s -1.1s  linear infinite; }
    .c7  { animation: fall 4.3s -0.2s  linear infinite; }
    .c8  { animation: fall 3.0s -2.0s  linear infinite; }
    .c9  { animation: fall 4.0s -0.7s  linear infinite; }
    .c10 { animation: fall 3.3s -1.5s  linear infinite; }
    .c11 { animation: fall 4.5s -2.6s  linear infinite; }
    .c12 { animation: fall 2.7s -0.6s  linear infinite; }
    .c13 { animation: fall 4.2s -1.9s  linear infinite; }
    .c14 { animation: fall 3.6s -1.0s  linear infinite; }
    .c15 { animation: fall 3.9s -1.6s  linear infinite; }
    .c16 { animation: fall 2.9s -2.4s  linear infinite; }
    .c17 { animation: fall 4.4s -0.1s  linear infinite; }
    .c18 { animation: fall 3.1s -1.8s  linear infinite; }
    .c19 { animation: fall 3.7s -1.1s  linear infinite; }
    .c20 { animation: fall 3.4s -1.4s  linear infinite; }
    .c21 { animation: fall 4.1s -0.5s  linear infinite; }
    .c22 { animation: fall 2.7s -2.1s  linear infinite; }
    .c23 { animation: fall 4.6s -1.2s  linear infinite; }
    .c24 { animation: fall 3.2s -0.8s  linear infinite; }
    .c25 { animation: fall 3.8s -2.0s  linear infinite; }
    .c26 { animation: fall 2.6s -0.3s  linear infinite; }
    .c27 { animation: fall 4.3s -1.7s  linear infinite; }
    .c28 { animation: fall 3.0s -0.9s  linear infinite; }
    .c29 { animation: fall 4.0s -2.5s  linear infinite; }
    .c30 { animation: fall 3.3s -1.2s  linear infinite; }
    .c31 { animation: fall 4.5s -0.6s  linear infinite; }
    .c32 { animation: fall 2.8s -1.9s  linear infinite; }
